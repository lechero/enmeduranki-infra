services:
  urban-lounge:
    container_name: sippar-urban-lounge
    env_file:
      - .env
    image: ${URBAN_LOUNGE_IMAGE:-fuentastic/urban-lounge-web:latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.urban-lounge-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.urban-lounge-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.urban-lounge-http.entrypoints=web"
      - "traefik.http.routers.urban-lounge-http.middlewares=urban-lounge-https-redirect"
      - "traefik.http.routers.urban-lounge-http.rule=Host(`urban-lounge.fuentastic.com`)"
      - "traefik.http.routers.urban-lounge-http.service=urban-lounge-svc"
      - "traefik.http.routers.urban-lounge.entrypoints=websecure"
      - "traefik.http.routers.urban-lounge.middlewares=urban-lounge-headers@docker"
      - "traefik.http.routers.urban-lounge.rule=Host(`urban-lounge.fuentastic.com`)"
      - "traefik.http.routers.urban-lounge.service=urban-lounge-svc"
      - "traefik.http.routers.urban-lounge.tls.certresolver=lehttp"
      - "traefik.http.routers.urban-lounge.tls=true"
      - "traefik.http.services.urban-lounge-svc.loadbalancer.server.port=3000"
    networks:
      - proxy
    restart: unless-stopped

  urban-lounge-preview:
    container_name: sippar-urban-lounge-preview
    env_file:
      - .env.preview
    image: ${URBAN_LOUNGE_PREVIEW_IMAGE:-fuentastic/urban-lounge-preview-web:latest}
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.urban-lounge-preview-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.urban-lounge-preview-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.urban-lounge-preview-http.entrypoints=web"
      - "traefik.http.routers.urban-lounge-preview-http.middlewares=urban-lounge-preview-https-redirect"
      - "traefik.http.routers.urban-lounge-preview-http.rule=Host(`urban-lounge-preview.fuentastic.com`)"
      - "traefik.http.routers.urban-lounge-preview-http.service=urban-lounge-preview-svc"
      - "traefik.http.routers.urban-lounge-preview.entrypoints=websecure"
      - "traefik.http.routers.urban-lounge-preview.middlewares=urban-lounge-preview-headers@docker"
      - "traefik.http.routers.urban-lounge-preview.rule=Host(`urban-lounge-preview.fuentastic.com`)"
      - "traefik.http.routers.urban-lounge-preview.service=urban-lounge-preview-svc"
      - "traefik.http.routers.urban-lounge-preview.tls.certresolver=lehttp"
      - "traefik.http.routers.urban-lounge-preview.tls=true"
      - "traefik.http.services.urban-lounge-preview-svc.loadbalancer.server.port=3000"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
