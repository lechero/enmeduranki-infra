services:
  mock-oauth2-server:
    container_name: sippar-mock-fuentastic-oauth
    environment:
      JSON_CONFIG_PATH: /etc/mock-oauth2-server/config.json
    image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    labels:
      - "traefik.enable=true"
      - "traefik.http.middlewares.mock-fuentastic-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.mock-fuentastic-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.mock-fuentastic-http.entrypoints=web"
      - "traefik.http.routers.mock-fuentastic-http.middlewares=mock-fuentastic-https-redirect"
      - "traefik.http.routers.mock-fuentastic-http.rule=Host(`mock.fuentastic.com`)"
      - "traefik.http.routers.mock-fuentastic-http.service=mock-fuentastic-svc"
      - "traefik.http.routers.mock-fuentastic.entrypoints=websecure"
      - "traefik.http.routers.mock-fuentastic.middlewares=mock-fuentastic-headers@docker"
      - "traefik.http.routers.mock-fuentastic.rule=Host(`mock.fuentastic.com`)"
      - "traefik.http.routers.mock-fuentastic.service=mock-fuentastic-svc"
      - "traefik.http.routers.mock-fuentastic.tls.certresolver=lehttp"
      - "traefik.http.routers.mock-fuentastic.tls=true"
      - "traefik.http.services.mock-fuentastic-svc.loadbalancer.server.port=8080"
    networks:
      - proxy
    restart: unless-stopped
    volumes:
      - ./config.json:/etc/mock-oauth2-server/config.json:ro

networks:
  proxy:
    external: true
